# Déploiement Dokploy (type "Compose").
#
# Stack auto-suffisante : PostgreSQL (service `db`, volume `pgdata`) et Redis
# tournent DANS la stack ; `web` les joint via le réseau privé `internal`.
# `web` est aussi rattaché au réseau EXTERNE `dokploy-network` — indispensable
# pour que l'ingress Traefik de Dokploy route le domaine vers le conteneur.
#
# À renseigner côté Dokploy (Environment de l'app) — POSTGRES_HOST reste `db` :
#   POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD  (identiques pour db + web)
#   DJANGO_SECRET_KEY  = clé forte (pas la valeur de dev)
#   DJANGO_ALLOWED_HOSTS = ton domaine (ex. wiki.exemple.com)
#   CORS_ALLOWED_ORIGINS = origine(s) du frontend (ex. https://wiki.exemple.com)
#   MFA_ENCRYPTION_KEY  = clé Fernet dédiée (recommandé)
#   FRONTEND_URL        = URL publique du frontend (liens d'invitation)
services:
  db:
    image: postgres:16
    container_name: dokploy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikicollab}
      POSTGRES_USER: ${POSTGRES_USER:-wikicollab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikicollab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikicollab} -d ${POSTGRES_DB:-wikicollab}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal  # partagé avec `web` pour la connexion Postgres

  web:
    build: ./backend
    restart: unless-stopped
    # migrate + collectstatic (admin/DRF servis par WhiteNoise en prod) puis ASGI.
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      # --- Base PostgreSQL interne à la stack (service `db` ci-dessus) ---
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-wikicollab}
      POSTGRES_USER: ${POSTGRES_USER:-wikicollab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikicollab}
      # --- Redis interne à cette stack (service ci-dessous) ---
      REDIS_URL: redis://redis:6379/0
      # --- Django ---
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      # --- SSO OAuth (settings-based, cf. config.settings._oauth_app) ---
      # Ces valeurs doivent être injectées DANS le conteneur : les définir dans
      # l'UI Dokploy ne suffit pas si elles ne sont pas listées ici.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
    # Pas de `ports:` — Dokploy/Traefik route le trafic vers ce service via
    # dokploy-network (configure le domaine + port 8000 dans l'UI Dokploy).
    expose:
      - "8000"
    networks:
      - dokploy-network  # pour joindre la base Dokploy + l'ingress Traefik
      - internal         # pour joindre redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

networks:
  # Réseau partagé de Dokploy — doit exister (Dokploy le crée). `external: true`
  # dit à Compose de s'y rattacher au lieu d'en créer un nouveau.
  dokploy-network:
    external: true
  # Réseau privé de cette stack (web <-> db + redis).
  internal:

volumes:
  # Persiste les données PostgreSQL entre redéploiements.
  pgdata:
